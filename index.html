<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stuff Jesus Did</title>
  <meta name="description" content="Refresh for another documented Gospel moment. Cured blindness with spit. Cursed a fig tree. Napped through a storm. Every entry is in the Gospels." />
  <meta property="og:title" content="Stuff Jesus Did" />
  <meta property="og:description" content="Refresh for another documented Gospel moment. Every entry is in the Gospels. Look them up." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stuffjesusdid.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Stuff Jesus Did" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Karla:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #F8F4EA;
      --ink: #21303A;
      --red: #B3261E;
      --faint: #8B857A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Karla', system-ui, sans-serif;
    }
    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      padding:
        max(18px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    }

    /* ---- masthead ---- */
    .masthead {
      text-align: center;
      flex-shrink: 0;
      padding-bottom: 12px;
    }
    .masthead h1 {
      font-weight: 900;
      font-size: clamp(11px, 2.2vw, 14px);
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .masthead h1 a { color: inherit; text-decoration: none; }
    .rule { border: 0; border-top: 2px solid var(--ink); margin: 0 0 3px; }
    .rule.thin { border-top-width: 1px; margin-bottom: 0; }

    /* ---- card ---- */
    .card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 12px 0;
      /* swipe hint: nudge left once on first load */
      animation: swipe-hint 1.2s 1.4s ease both;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }
    /* runs once on page load to suggest swipability */
    @keyframes swipe-hint {
      0%   { transform: translateX(0);    opacity: 1; }
      30%  { transform: translateX(-18px); opacity: 0.85; }
      60%  { transform: translateX(4px);  opacity: 1; }
      100% { transform: translateX(0);    opacity: 1; }
    }
    /* swipe-out left */
    .card.exit-left {
      animation: exit-left 0.22s ease forwards;
    }
    /* enter from right */
    .card.enter-right {
      animation: enter-right 0.22s ease forwards;
    }
    @keyframes exit-left {
      to { transform: translateX(-60px); opacity: 0; }
    }
    @keyframes enter-right {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ---- illustration ---- */
    .deed-img-wrap {
      flex-shrink: 1;
      min-height: 0;
      height: clamp(80px, 28dvh, 220px);
      width: clamp(80px, 28dvh, 220px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(12px, 2.5dvh, 24px);
    }
    .deed-img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .deed-img-wrap img.loaded { opacity: 1; }
    .deed-img-wrap .placeholder {
      width: 60px; height: 60px; opacity: 0.15;
    }
    .deed-img-wrap .placeholder path {
      fill: none; stroke: var(--ink); stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ---- text ---- */
    .deed-text {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: clamp(22px, 5.5vw, 42px);
      line-height: 1.22;
      animation: rise 0.35s ease both;
      padding: 0 4px;
    }
    .deed-note {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 3vw, 20px);
      color: var(--faint);
      margin-top: clamp(8px, 1.5dvh, 14px);
      animation: rise 0.35s 0.06s ease both;
    }
    .deed-ref {
      font-weight: 700;
      font-size: clamp(10px, 1.8vw, 13px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-top: clamp(10px, 2dvh, 24px);
      animation: rise 0.35s 0.12s ease both;
    }
    .deed-ref a {
      color: var(--red); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s ease;
    }
    .deed-ref a:hover,
    .deed-ref a:focus-visible { border-bottom-color: var(--red); }
    .deed-ref::before { content: "\2014  "; color: var(--red); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- actions ---- */
    .actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.5dvh, 14px);
      padding-top: clamp(8px, 1.5dvh, 14px);
    }
    .btn {
      font-family: 'Karla', sans-serif;
      font-weight: 700;
      font-size: clamp(12px, 2.2vw, 15px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      border: 2px solid var(--ink);
      border-radius: 0;
      padding: clamp(10px, 1.8dvh, 15px) 34px;
      cursor: pointer;
      min-width: 220px;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .btn:hover { color: var(--red); border-color: var(--red); }
    .btn:active { background: var(--red); color: var(--paper); border-color: var(--red); }
    .btn:focus-visible { outline: 3px solid var(--red); outline-offset: 3px; }
    .subactions { display: flex; gap: 26px; align-items: center; }
    .linkbtn {
      font-family: 'Karla', sans-serif;
      font-weight: 700;
      font-size: clamp(10px, 1.8vw, 12px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
      background: none; border: none;
      padding: 6px 0; cursor: pointer;
      border-bottom: 1px solid transparent;
      min-height: 36px;
      display: flex; align-items: center;
      transition: color .15s ease, border-color .15s ease;
    }
    .linkbtn:hover,
    .linkbtn:focus-visible { color: var(--red); border-bottom-color: var(--red); outline: none; }
    .count {
      font-size: clamp(10px, 1.6vw, 12px);
      letter-spacing: 0.18em;
      color: var(--faint);
      text-transform: uppercase;
    }

    /* ---- swipe arrow hint (fades out after first swipe) ---- */
    .swipe-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--faint);
      opacity: 0;
      animation: fade-label 2s 2.2s ease forwards;
      pointer-events: none;
    }
    @keyframes fade-label {
      0%   { opacity: 0; }
      20%  { opacity: 0.7; }
      70%  { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* ---- toast ---- */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: var(--paper);
      font-size: 12px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 10px 22px;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
      .deed-img-wrap img { transition: none; }
      .deed-text, .deed-note, .deed-ref { animation: none; }
      .swipe-label { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <h1><a href="./">Stuff Jesus Did</a></h1>
      <hr class="rule" />
      <hr class="rule thin" />
    </header>

    <main class="card" id="card" aria-live="polite"></main>

    <div class="actions">
      <button class="btn" id="nextBtn" type="button">Another thing he did</button>
      <div class="subactions">
        <button class="linkbtn" id="shareBtn" type="button">Share</button>
        <button class="linkbtn" id="cardBtn" type="button">Save story card</button>
      </div>
      <span class="count" id="count"></span>
      <span class="swipe-label" id="swipeLabel">swipe to advance</span>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="entries.js"></script>
  <script>
    (function () {
      var BIBLE_VERSION = "NRSVUE";
      var SITE_NAME     = "stuffjesusdid.com";
      var IMG_DIR       = "icons/";
      var IMG_EXT       = ".png";
      var SWIPE_THRESHOLD = 50; // px

      var FALLBACK_SVG = '<svg class="placeholder" viewBox="0 0 100 100" aria-hidden="true">'
        + '<path d="M30 50 Q50 28 70 50 Q50 72 30 50 Z"/>'
        + '<path d="M50 28 v-14 M50 86 v-14 M28 50 h-14 M86 50 h-14"/>'
        + '</svg>';

      var ENTRIES = window.SJD_ENTRIES;
      var total   = ENTRIES.length;
      var byId    = {};
      ENTRIES.forEach(function (e, k) { byId[e.id] = k; });

      var deck    = shuffle(total);
      var pos     = -1;
      var current = null;
      var swiped  = false; // track whether hint label should hide

      function shuffle(n) {
        var a = [];
        for (var i = 0; i < n; i++) a.push(i);
        for (var j = a.length - 1; j > 0; j--) {
          var k = Math.floor(Math.random() * (j + 1));
          var tmp = a[j]; a[j] = a[k]; a[k] = tmp;
        }
        return a;
      }

      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function bibleURL(ref) {
        var clean = ref.replace(/\u2013/g, "-");
        return "https://www.biblegateway.com/passage/?search="
          + encodeURIComponent(clean) + "&version=" + BIBLE_VERSION;
      }

      function permalink(e) {
        return location.origin + location.pathname + "?d=" + e.id;
      }

      function renderContent(idx) {
        var e   = ENTRIES[idx];
        current = e;
        var imgSrc = IMG_DIR + e.i + IMG_EXT;

        var html = '<div class="deed-img-wrap">'
          + FALLBACK_SVG
          + '<img id="deedImg" src="' + esc(imgSrc) + '" alt="" aria-hidden="true">'
          + '</div>'
          + '<p class="deed-text">' + esc(e.t).replace(/\n/g, '<br>') + '</p>'
          + (e.n ? '<p class="deed-note">' + esc(e.n) + '</p>' : '')
          + '<p class="deed-ref"><a href="' + bibleURL(e.r)
          + '" target="_blank" rel="noopener" title="Read in context">'
          + esc(e.r) + '</a></p>';

        document.getElementById("card").innerHTML = html;
        document.getElementById("count").textContent =
          "\u2116 " + (idx + 1) + " \u00B7 of " + total;

        var img = document.getElementById("deedImg");
        if (img) {
          img.addEventListener("load", function () {
            img.classList.add("loaded");
            var ph = document.querySelector(".placeholder");
            if (ph) ph.style.display = "none";
          });
          img.addEventListener("error", function () {
            img.style.display = "none";
          });
        }

        history.replaceState(null, "", "?d=" + e.id);
        document.title = "Stuff Jesus Did \u2014 " + e.t;
      }

      function advance() {
        pos += 1;
        if (pos >= total) { deck = shuffle(total); pos = 0; }

        // hide swipe label permanently after first swipe
        if (!swiped) {
          swiped = true;
          var label = document.getElementById("swipeLabel");
          if (label) { label.style.animation = "none"; label.style.opacity = "0"; }
        }

        var card = document.getElementById("card");

        // exit animation
        card.classList.add("exit-left");
        setTimeout(function () {
          card.classList.remove("exit-left");
          renderContent(deck[pos]);
          // force reflow so enter animation triggers fresh
          void card.offsetWidth;
          card.classList.add("enter-right");
          card.addEventListener("animationend", function handler() {
            card.classList.remove("enter-right");
            card.removeEventListener("animationend", handler);
          });
        }, 200);
      }

      // first render — no animation
      function boot(idx) {
        pos = idx !== undefined ? idx : 0;
        renderContent(deck[pos]);
      }

      // ---- swipe detection ----------------------------------------
      var touchStartX = 0;
      var touchStartY = 0;

      document.addEventListener("touchstart", function (e) {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
      }, { passive: true });

      document.addEventListener("touchend", function (e) {
        var dx = touchStartX - e.changedTouches[0].screenX;
        var dy = Math.abs(touchStartY - e.changedTouches[0].screenY);
        // only trigger if horizontal movement dominates
        if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > dy) {
          if (dx > 0) advance(); // swipe left = next
        }
      }, { passive: true });

      // ---- keyboard & button --------------------------------------
      document.getElementById("nextBtn").addEventListener("click", advance);
      window.addEventListener("keydown", function (e) {
        if ((e.code === "Space" || e.code === "ArrowRight" || e.code === "Enter")
            && e.target.tagName !== "BUTTON" && e.target.tagName !== "A") {
          e.preventDefault();
          advance();
        }
      });

      // ---- share --------------------------------------------------
      function share() {
        if (!current) return;
        var url = permalink(current);
        var payload = { title: "Stuff Jesus Did \u2014 " + current.t, url: url };
        if (navigator.share) {
          navigator.share(payload).catch(function () {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function () { toast("Link copied"); });
        }
      }

      // ---- story card ---------------------------------------------
      function wrapText(ctx, text, maxWidth) {
        var words = text.split(" "), lines = [], line = "";
        words.forEach(function (w) {
          var test = line ? line + " " + w : w;
          if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
          else { line = test; }
        });
        if (line) lines.push(line);
        return lines;
      }

      function storyCard() {
        if (!current) return;
        var e = current;
        Promise.all([
          document.fonts.load('72px "IM Fell English"'),
          document.fonts.load('italic 40px "IM Fell English"'),
          document.fonts.load('700 32px "Karla"')
        ]).then(function () {
          var W = 1080, H = 1920;
          var c = document.createElement("canvas");
          c.width = W; c.height = H;
          var ctx = c.getContext("2d");
          ctx.fillStyle = "#F8F4EA";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#21303A";
          ctx.font = "700 30px Karla";
          ctx.textAlign = "center";
          ctx.letterSpacing = "12px";
          ctx.fillText("STUFF JESUS DID", W / 2 + 6, 170);
          ctx.letterSpacing = "0px";
          ctx.fillRect(120, 205, W - 240, 4);
          ctx.fillRect(120, 216, W - 240, 2);

          var drawCard = function () {
            ctx.fillStyle = "#21303A";
            ctx.font = '84px "IM Fell English"';
            var lines = wrapText(ctx, e.t, W - 220);
            var lh = 104, textTop = 980;
            lines.forEach(function (ln, k) { ctx.fillText(ln, W / 2, textTop + k * lh); });
            var yAfter = textTop + lines.length * lh;
            if (e.n) {
              ctx.fillStyle = "#8B857A";
              ctx.font = 'italic 46px "IM Fell English"';
              var nlines = wrapText(ctx, e.n, W - 260);
              nlines.forEach(function (ln, k) { ctx.fillText(ln, W / 2, yAfter + 30 + k * 60); });
              yAfter += 30 + nlines.length * 60;
            }
            ctx.fillStyle = "#B3261E";
            ctx.font = "700 34px Karla";
            ctx.letterSpacing = "10px";
            ctx.fillText("\u2014 " + e.r.toUpperCase(), W / 2 + 5, yAfter + 90);
            ctx.letterSpacing = "0px";
            ctx.fillStyle = "#8B857A";
            ctx.font = "700 30px Karla";
            ctx.letterSpacing = "8px";
            ctx.fillText(SITE_NAME.toUpperCase(), W / 2 + 4, H - 120);
            ctx.letterSpacing = "0px";
            c.toBlob(function (blob) {
              var file = new File([blob], "stuff-jesus-did-" + e.id + ".png", { type: "image/png" });
              if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: "Stuff Jesus Did" }).catch(function () {});
              } else {
                var a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = file.name;
                a.click();
                URL.revokeObjectURL(a.href);
                toast("Card saved");
              }
            }, "image/png");
          };

          var existingImg = document.getElementById("deedImg");
          if (existingImg && existingImg.complete && existingImg.naturalWidth > 0) {
            try { ctx.drawImage(existingImg, (W - 500) / 2, 380, 500, 500); } catch(err) {}
            drawCard();
          } else {
            var img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = function () { ctx.drawImage(img, (W - 500) / 2, 380, 500, 500); drawCard(); };
            img.onerror = drawCard;
            img.src = IMG_DIR + e.i + IMG_EXT;
          }
        });
      }

      // ---- toast --------------------------------------------------
      function toast(msg) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._h);
        t._h = setTimeout(function () { t.classList.remove("show"); }, 2200);
      }

      document.getElementById("shareBtn").addEventListener("click", share);
      document.getElementById("cardBtn").addEventListener("click", storyCard);

      // ---- boot ---------------------------------------------------
      var want = new URLSearchParams(location.search).get("d");
      if (want && byId.hasOwnProperty(want)) {
        var idx = byId[want];
        var di  = deck.indexOf(idx);
        var tmp = deck[0]; deck[0] = deck[di]; deck[di] = tmp;
        boot(0);
        pos = 0;
        renderContent(idx);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
