<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Gallery — Stuff Jesus Did</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #F8F4EA;
      color: #21303A;
      font-family: 'Karla', system-ui, sans-serif;
      padding: 32px 20px;
    }
    h1 {
      font-size: 15px; letter-spacing: 0.3em; text-transform: uppercase;
      text-align: center; margin: 0 0 8px;
    }
    p.hint { text-align: center; font-size: 13px; color: #8B857A; margin: 0 0 32px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 18px;
      max-width: 900px;
      margin: 0 auto;
    }
    .cell {
      border: 1px solid #21303A;
      padding: 16px 8px 12px;
      text-align: center;
      background: #F8F4EA;
    }
    .cell svg { width: 72px; height: 72px; }
    .cell svg path {
      fill: none; stroke: #21303A; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .cell code {
      display: block; margin-top: 8px; font-size: 13px; font-weight: 700;
      color: #B3261E;
    }
  </style>
</head>
<body>
  <h1>Icon Gallery</h1>
  <p class="hint">Use these names in the <strong>i:</strong> field of entries.js</p>
  <div class="grid" id="grid"></div>
  <script src="icons.js"></script>
  <script>
    var grid = document.getElementById("grid");
    Object.keys(window.SJD_ICONS).sort().forEach(function (name) {
      var paths = window.SJD_ICONS[name].map(function (d) {
        return '<path d="' + d + '"></path>';
      }).join("");
      var cell = document.createElement("div");
      cell.className = "cell";
      cell.innerHTML = '<svg viewBox="0 0 100 100">' + paths + '</svg><code>' + name + '</code>';
      grid.appendChild(cell);
    });
  </script>
</body>
</html>
